<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Ortiz · Alaska 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:       #0d1f35;
            --navy-mid:   #152d4a;
            --navy-light: #1e3f68;
            --gold:       #d4af37;
            --gold-light: #e8cc6a;
            --gold-pale:  #f5e9b0;
            --glacier:    #4a9db5;
            --cream:      #fdf8ef;
            --white:      #ffffff;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            min-height: 100svh;
        }

        /* Subtle radial glow behind crest */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 40%, rgba(212,175,55,.13) 0%, transparent 70%),
                radial-gradient(ellipse 100% 80% at 50% 100%, rgba(74,157,181,.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Star field */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(.6); }
            50%       { opacity: var(--peak); transform: scale(1); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            width: min(420px, 96vw);
            padding: 48px 32px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeUp .9s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Crest */
        .crest-wrap {
            position: relative;
            margin-bottom: 28px;
            animation: fadeUp .9s .15s cubic-bezier(.22,.68,0,1.2) both;
        }
        .crest-glow {
            position: absolute;
            inset: -24px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212,175,55,.22) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%       { transform: scale(1.08); opacity: .7; }
        }
        .crest-img {
            width: min(240px, 62vw);
            height: auto;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 8px 32px rgba(0,0,0,.55)) drop-shadow(0 0 12px rgba(212,175,55,.35));
        }

        /* Divider line */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 22px;
            animation: fadeUp .9s .3s cubic-bezier(.22,.68,0,1.2) both;
        }

        /* Trip name */
        .trip-name {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 700;
            color: var(--gold-pale);
            letter-spacing: .5px;
            line-height: 1.15;
            margin-bottom: 10px;
            animation: fadeUp .9s .35s cubic-bezier(.22,.68,0,1.2) both;
        }
        .trip-sub {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,.55);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 28px;
            animation: fadeUp .9s .42s cubic-bezier(.22,.68,0,1.2) both;
        }

        /* Family row */
        .families {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
            animation: fadeUp .9s .5s cubic-bezier(.22,.68,0,1.2) both;
        }
        .fam-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .fam-name {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,.7);
        }
        .fam-sep {
            width: 1px;
            height: 14px;
            background: rgba(255,255,255,.2);
        }

        /* Enter button */
        .enter-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 36px;
            border: none;
            border-radius: 100px;
            background: linear-gradient(135deg, var(--gold) 0%, #b8932a 100%);
            color: var(--navy);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: .5px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(212,175,55,.4), 0 1px 3px rgba(0,0,0,.3);
            transition: transform .18s ease, box-shadow .18s ease;
            animation: fadeUp .9s .6s cubic-bezier(.22,.68,0,1.2) both;
            -webkit-tap-highlight-color: transparent;
        }
        .enter-btn:active {
            transform: scale(.96);
            box-shadow: 0 2px 10px rgba(212,175,55,.3);
        }
        .enter-btn .arrow {
            font-size: 16px;
            transition: transform .2s ease;
        }
        .enter-btn:hover .arrow { transform: translateX(3px); }

        /* Countdown under button */
        .countdown {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,.35);
            letter-spacing: 1px;
            animation: fadeUp .9s .72s cubic-bezier(.22,.68,0,1.2) both;
        }
        .countdown strong {
            color: var(--gold);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Star field -->
    <div class="stars" id="stars"></div>

    <div class="card">

        <!-- Crest -->
        <div class="crest-wrap">
            <div class="crest-glow"></div>
            <img class="crest-img" src="ortiz-crest.png" alt="Ortiz Family Crest">
        </div>

        <div class="divider"></div>

        <div class="trip-name">Alaska Cruise<br>2026</div>
        <div class="trip-sub">Disney Wonder · June 15–22</div>

        <!-- Families -->
        <div class="families">
            <span class="fam-dot" style="background:#4a9db5;"></span>
            <span class="fam-name">Ortiz</span>
            <span class="fam-sep"></span>
            <span class="fam-dot" style="background:#68a882;"></span>
            <span class="fam-name">Stallings</span>
            <span class="fam-sep"></span>
            <span class="fam-dot" style="background:#d4af37;"></span>
            <span class="fam-name">Simmons</span>
        </div>

        <a class="enter-btn" href="index.html">
            Begin the Adventure <span class="arrow">→</span>
        </a>

        <div class="countdown" id="countdown"></div>

    </div>

    <script>
        // Stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.2 + .6;
            s.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random()*100}%;
                top:${Math.random()*100}%;
                --dur:${(Math.random()*3+2).toFixed(1)}s;
                --delay:${(Math.random()*4).toFixed(1)}s;
                --peak:${(Math.random()*.6+.2).toFixed(2)};
            `;
            starsEl.appendChild(s);
        }

        // Countdown
        const cruise = new Date('2026-06-15T12:00:00');
        function updateCountdown() {
            const now = new Date();
            const diff = cruise - now;
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = '🚢 Bon Voyage!';
                return;
            }
            const days = Math.floor(diff / 86400000);
            document.getElementById('countdown').innerHTML =
                `<strong>${days}</strong> day${days !== 1 ? 's' : ''} until we set sail`;
        }
        updateCountdown();
    </script>

</body>
</html>
